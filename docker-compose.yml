services:
  portfolio:
    build:
      context: .
      target: runner
    image: chanaka-portfolio:latest
    container_name: chanaka-portfolio
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "3000:3000"

  portfolio-dev:
    image: node:22-alpine
    profiles:
      - dev
    container_name: chanaka-portfolio-dev
    working_dir: /app
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - portfolio_node_modules:/app/node_modules

volumes:
  portfolio_node_modules:
